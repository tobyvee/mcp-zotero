name: Release

# Runs when a version tag (e.g. v1.2.3) is pushed: tests, cross-compiles, and
# publishes the binaries to a GitHub Release. Change the pattern to '*' to fire
# on every tag.
on:
  push:
    tags:
      - "v*"

# Needed for `gh release create` to publish a release with the built-in token.
permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make test

  release:
    name: Build & release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so version metadata resolves
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cross-compile
        run: make cross VERSION="${{ github.ref_name }}"

      - name: Checksums
        run: cd bin && sha256sum mcp-zotero-* > checksums.txt

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            ./bin/mcp-zotero-* ./bin/checksums.txt \
            --title "${{ github.ref_name }}" \
            --generate-notes
